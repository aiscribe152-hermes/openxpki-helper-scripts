name: Shell validation

on:
  push:
  pull_request:

jobs:
  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          bash -n scripts/openxpki-lxc.sh
          bash -n install/openxpki-install.sh
          bash -n container-scripts/openxpki-db-setup.sh
          bash -n container-scripts/openxpki-production-setup.sh
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
